services:
  multi-shoot:
    build: .
    container_name: multi-shoot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/app/data/multi-shoot.db
    volumes:
      - ./data:/app/data

  # 예시: nginx 역프록시 (선택). 사용시 docker-compose --profile proxy up
  nginx:
    image: nginx:alpine
    container_name: multi-shoot-nginx
    profiles: ["proxy"]
    depends_on:
      - multi-shoot
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
