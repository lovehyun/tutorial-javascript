# 예시 nginx 설정 — prefix /shoot/ 로 역프록시 + WebSocket 업그레이드 처리
# docker-compose --profile proxy up 으로 nginx 컨테이너 함께 띄우면 사용 가능

server {
    listen 80;
    server_name _;

    # /shoot/ 로 들어오면 backend(/) 로 forward
    # 마지막 슬래시(/) 가 있어야 prefix 가 strip 되어 backend 에 전달됨
    location /shoot/ {
        proxy_pass http://multi-shoot:3000/;

        # WebSocket 업그레이드 헤더
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # 클라이언트 IP 전달
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
    }

    # 루트로 직접 띄울 때
    location / {
        proxy_pass http://multi-shoot:3000;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
