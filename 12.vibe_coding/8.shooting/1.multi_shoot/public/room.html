<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Multi-Shoot — 게임</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/room.css">
</head>
<body>

<canvas id="game-canvas" width="1600" height="900"></canvas>

<!-- 좌측 상단 — TOP 3 리더보드 -->
<div class="hud-top">
    <div id="leaderboard"></div>
    <div id="info-center">
        <div><span id="info-room">ROOM</span></div>
        <div>STAGE <span id="info-stage" class="stage">1</span> · TOP <span id="info-topscore" class="topscore">0</span></div>
    </div>
    <div id="hud-right">
        <div id="info-stats">HIT 0/0 (0%)</div>
    </div>
</div>

<!-- 정확도별 배점표 -->
<div id="scoreTable">
    <div class="title">정확도별 배점</div>
    <div class="row" data-tier="0"><span>≥ 80%</span><span>10/7/5/3/1</span></div>
    <div class="row" data-tier="1"><span>≥ 60%</span><span>8/6/5/3/1</span></div>
    <div class="row" data-tier="2"><span>≥ 40%</span><span>6/5/3/2/1</span></div>
    <div class="row" data-tier="3"><span>≥ 30%</span><span>4/3/1/1/1</span></div>
    <div class="row" data-tier="4"><span>≥ 20%</span><span>3/1/1/1/1</span></div>
    <div class="row" data-tier="5"><span>&lt; 20%</span><span>1/1/1/1/1</span></div>
</div>

<div id="topbar">
    <button id="leave-btn">← 로비로 나가기</button>
    <button id="change-nickname-btn">닉네임 변경</button>
</div>

<div id="overlay">
    <div class="msg" style="font-size:18px">연결 중…</div>
    <button onclick="location.href='index.html'">로비로 돌아가기</button>
</div>

<script src="socket.io/socket.io.js"></script>
<script src="js/socket.js"></script>
<script src="js/nickname.js"></script>
<script src="js/room.js"></script>
</body>
</html>
