<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스코프 줌 연습</title>
<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 마우스 상태
let isMouseDown = false;
let isScoped = false;
let timer = null;

let mouse = {
    x: canvas.width / 2,
    y: canvas.height / 2
};

// 과녁 정보
const target = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    baseRadius: 80
};

// 과녁 기본 크기: 1/3
const normalScale = 1 / 3;

// 스코프 안에서 보이는 확대 크기
let zoomScale = normalScale;
const maxZoomScale = 1;

// 스코프 크기
const scopeRadius = 120;

// 과녁 그리기
function drawTarget(scale) {
    const colors = ["#fff", "#fcc", "#f66", "#f00", "#900"];

    for (let i = 5; i > 0; i--) {
        ctx.beginPath();
        ctx.arc(
            target.x,
            target.y,
            target.baseRadius * (i / 5) * scale,
            0,
            Math.PI * 2
        );
        ctx.fillStyle = colors[i - 1];
        ctx.fill();
    }
}

// 스코프 그리기
function drawScope() {
    // 전체 어둡게
    ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 스코프 안쪽만 밝게 다시 그리기
    ctx.save();

    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, scopeRadius, 0, Math.PI * 2);
    ctx.clip();

    drawTarget(zoomScale);

    ctx.restore();

    // 스코프 테두리
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, scopeRadius, 0, Math.PI * 2);
    ctx.lineWidth = 3;
    ctx.strokeStyle = "white";
    ctx.stroke();

    // 조준선
    ctx.beginPath();
    ctx.moveTo(mouse.x - 20, mouse.y);
    ctx.lineTo(mouse.x + 20, mouse.y);
    ctx.moveTo(mouse.x, mouse.y - 20);
    ctx.lineTo(mouse.x, mouse.y + 20);
    ctx.strokeStyle = "white";
    ctx.stroke();
}

// 줌 애니메이션
function updateZoom() {
    if (isScoped && zoomScale < maxZoomScale) {
        zoomScale += 0.03;
    }

    if (zoomScale > maxZoomScale) {
        zoomScale = maxZoomScale;
    }
}

// 반복 실행
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updateZoom();

    // 평소에는 과녁이 1/3 크기
    drawTarget(normalScale);

    // 스코프 상태면 스코프 안에서 확대된 과녁 표시
    if (isScoped) {
        drawScope();
    }

    requestAnimationFrame(loop);
}

// 마우스 이동
canvas.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// 마우스 누름
canvas.addEventListener("mousedown", () => {
    isMouseDown = true;

    timer = setTimeout(() => {
        if (isMouseDown) {
            isScoped = true;
            zoomScale = normalScale;
        }
    }, 1000);
});

// 마우스 뗌
canvas.addEventListener("mouseup", () => {
    isMouseDown = false;
    clearTimeout(timer);

    isScoped = false;
    zoomScale = normalScale;
});

loop();
</script>

</body>
</html>
