<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Splash</title>
<style>
    .splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: #000;
        color: #fff;
        font-size: 2em;

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 1000;

        /* 핵심 */
        animation: fadeOut 1s ease-in-out 3s forwards;
    }

    .content {
        opacity: 0;
        animation: fadeIn 1s ease-in-out 4s forwards;
        padding: 20px;
    }

    /* 3초 후 → 1초 동안 사라짐 */
    @keyframes fadeOut {
        to {
            opacity: 0;
            visibility: hidden;
        }
    }

    /* 4초 후 → 등장 */
    @keyframes fadeIn {
        to {
            opacity: 1;
        }
    }
</style>
</head>
<body>

<div class="splash">Loading...</div>

<div class="content">
    <h1>Welcome!</h1>
    <p>Main content입니다.</p>
</div>

</body>
</html>
