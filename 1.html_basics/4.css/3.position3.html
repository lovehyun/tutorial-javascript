<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .bg {
            height: 300px;
            background-color: orange;
        }
        .center {
            background-color: orangered;
        }
        .fixed {
            width: 100px;
            height: 100px;
            background-color: white;
            position: fixed;
            bottom: 50px;
            right: 50px;
            background-image: url(../images/starbucks.png);
            background-size: 100% 100%;
        }
    </style>
</head>
<body>
    <div class="bg"></div>    
    <div class="bg center"></div>    
    <div class="bg"></div>    
    <div class="fixed"></div>    
    <script>
        // const el = document.querySelector('.fixed');

        // el.onclick = () => {
        //     el.style.transform = 
        //         el.style.transform === 'scale(0.2)' ? 'scale(1)' : 'scale(0.2)';
        // };
    </script>
    <script>
        const el = document.querySelector('.fixed');

        let expanded = false;

        el.onclick = () => {
            expanded = !expanded;

            if (expanded) {
                el.style.width = '200px';
                el.style.height = '400px';
                el.style.backgroundImage = 'none';   // 이미지 제거
                el.style.backgroundColor = '#dadada';  // 회색 배경
            } else {
                el.style.width = '100px';
                el.style.height = '100px';
                el.style.backgroundImage = 'url(../images/starbucks.png)'; // 다시 이미지
                el.style.backgroundColor = ''; // 원래대로
            }
        };
    </script>
</body>
</html>
