<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch App</title>
    <style>
        body {
            display: flex; /* Flexbox 사용 */
            flex-direction: column; /* 수직 정렬 */
            align-items: center; /* 가로 중앙 정렬 */
            justify-content: center; /* 세로 중앙 정렬 */
            height: 100vh; /* 전체 화면 높이 */
            margin: 0;
            background-color: #f0f0f0; /* 배경색 설정 */
        }
        #display {
            font-size: 48px; /* 글자 크기 */
            margin-bottom: 20px; /* 아래 여백 */
        }
        .button-container {
            display: flex; /* Flexbox 사용 */
            gap: 10px; /* 버튼 사이의 간격 */
        }
        .button-container button {
            padding: 10px 20px; /* 패딩 설정 */
            font-size: 18px; /* 글자 크기 */
        }

        /* 전체 스톱워치 박스 스타일 */
        .stopwatch-box {
            padding: 30px; /* 안쪽 여백 */
            border-radius: 20px; /* 둥근 테두리 */
            background-color: #ffffff; /* 박스 배경색 (흰색) */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* 그림자 효과 */
            display: flex; /* Flexbox 사용 */
            flex-direction: column; /* 세로 정렬 */
            align-items: center; /* 가로 중앙 정렬 */
        }
    </style>
</head>
<body>
    <!-- 스톱워치 전체를 감싸는 박스 -->
    <div class="stopwatch-box">
        <!-- 스톱워치 표시 영역 -->
        <div id="display">00:00.00</div>
        <!-- 버튼 컨테이너 -->
        <div class="button-container">
            <button id="startButton">Start</button>
            <button id="stopButton">Stop</button>
            <button id="resetButton">Reset</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const resetButton = document.getElementById('resetButton');

        let elapsed = 0;      // 누적 경과 시간(ms)
        let startTime = 0;    // 이번 실행 시작 시각
        let timerId = null;   // setInterval ID (null이면 정지 상태)

        // ms를 "MM:SS.cc" 형식으로 변환 (cc = 1/100초)
        function format(ms) {
            const m  = String(Math.floor(ms / 60000)).padStart(2, '0');
            const s  = String(Math.floor(ms / 1000) % 60).padStart(2, '0');
            const cs = String(Math.floor(ms / 10) % 100).padStart(2, '0');
            return `${m}:${s}.${cs}`;
        }

        // 실행 중이면 Stop만, 정지 상태면 Start만 활성화
        function setRunning(isRunning) {
            startButton.disabled = isRunning;
            stopButton.disabled = !isRunning;
        }

        function tick() {
            display.textContent = format(Date.now() - startTime);
        }

        function start() {
            if (timerId) return;
            startTime = Date.now() - elapsed; // 이전 경과 시간 이어서 시작
            timerId = setInterval(tick, 10);
            setRunning(true);
        }

        function stop() {
            if (!timerId) return;
            elapsed = Date.now() - startTime;
            clearInterval(timerId);
            timerId = null;
            setRunning(false);
        }

        function reset() {
            clearInterval(timerId);
            timerId = null;
            elapsed = 0;
            display.textContent = format(0);
            setRunning(false);
        }

        startButton.addEventListener('click', start);
        stopButton.addEventListener('click', stop);
        resetButton.addEventListener('click', reset);

        setRunning(false); // 초기 버튼 상태
    </script>
</body>
</html>
