<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <style>
        h1 {
            text-align: center;
        }
        .slider {
            display: flex;
            flex-direction: column;
            margin: 0 auto; /* 상하 좌우 */
            text-align: center;
            max-width: 600px;
            align-items: center;
        }
        .slider img {
            max-width: 100%;
            height: 300px;
            display: none; /* 이미지 기본적으로 숨김 */
        }
        .slider img.active {
            display: block; /* 활성화 이미지만 표시 */
        }
        .buttons {
            margin-top: 10px;
        }
        button {
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="slider">
        <img src="images/cat1.jpg" class="active" alt="Image 1">
        <img src="images/cat2.jpg" alt="Image 2">
        <img src="images/cat3.jpg" alt="Image 3">

        <div class="filename" id="filename">images/cat1.jpg</div>
        
        <div class="buttons">
            <button id="prevBtn">Previous</button>
            <button id="nextBtn">Next</button>
        </div>
    </div>

    <script>
        const imgs = document.querySelectorAll('.slider img');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const filename = document.getElementById('filename'); // 파일명 처리

        let i = 0;

        // 방법1. 무한 반복 1-2-3-1-2-3
        function show(direction) {
            imgs[index].classList.remove('active');
            index += direction;
            
            if (index >= imgs.length) index = 0;
            if (index < 0) index = imgs.length - 1;

            imgs[index].classList.add('active');

            filename.textContent = imgs[index].src.split('/').slice(-2).join('/');
        }

        prevBtn.addEventListener('click', () => show(1));
        nextBtn.addEventListener('click', () => show(-1));
        // 방법1. <--


        // 방법2. 무한반복 간단한 구조 -->
        function show(n) {
            imgs[i].classList.remove('active');
            i = (n + imgs.length) % imgs.length;
            imgs[i].classList.add('active');

            filename.textContent = imgs[i].src.split('/').pop(); // 파일명 처리
        }
        // 방법2. 무한 반복 <--

        prevBtn.addEventListener('click', () => show(i - 1));
        nextBtn.addEventListener('click', () => show(i + 1));

        // document.getElementById('prevBtn').onclick = () => show(i - 1);
        // document.getElementById('nextBtn').onclick = () => show(i + 1); // 함수를 등록 O
        // document.getElementById('prevBtn').onclick = show(i - 1); // 함수를 즉시 실행 X


        // 방법3. 유한 반복 버전 1-2-3 -->
        function show(n) {
            imgs[i].classList.remove('active');

            // 추가 (범위 제한)
            if (n < 0) n = 0;
            if (n > imgs.length - 1) n = imgs.length - 1;

            i = n;
            imgs[i].classList.add('active');

            filename.textContent = imgs[i].src.split('/').pop();

            // 추가 (버튼 상태)
            prevBtn.disabled = (i === 0);
            nextBtn.disabled = (i === imgs.length - 1);
        }
        // 방법3. 유한 반복 <--
    </script>
</body>
</html>
